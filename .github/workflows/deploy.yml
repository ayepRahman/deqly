name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  lint-and-check:
    name: Typecheck and Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm exec biome lint .

      # - name: Test
      #   run: pnpm test

  convex-deploy:
    name: Deploy Convex (backend)
    runs-on: ubuntu-latest
    needs: lint-and-check
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Convex environment variables
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          SITE_URL: ${{ vars.SITE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_IMAGES_API_TOKEN: ${{ secrets.CLOUDFLARE_IMAGES_API_TOKEN }}
        run: |
          CONVEX_ENV_VARS=("SITE_URL" "BETTER_AUTH_SECRET" "RESEND_API_KEY" "EMAIL_FROM" "CLOUDFLARE_ACCOUNT_ID" "CLOUDFLARE_IMAGES_API_TOKEN")
          for var_name in "${CONVEX_ENV_VARS[@]}"; do
            var_value="${!var_name}"
            if [ -n "$var_value" ]; then
              npx convex env set "$var_name" "$var_value" || echo "Warning: Failed to set $var_name"
            fi
          done

      - name: Deploy Convex
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: convex-deploy
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_CONVEX_URL: ${{ vars.VITE_CONVEX_URL }}
          VITE_CONVEX_SITE_URL: ${{ vars.VITE_CONVEX_SITE_URL }}
          VITE_CLOUDFLARE_IMAGES_ACCOUNT_HASH: ${{ vars.VITE_CLOUDFLARE_IMAGES_ACCOUNT_HASH }}

      - name: Deploy to Cloudflare Workers
        run: pnpm wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
